name: Bootstrap OIDC

# Run this ONCE, manually, to create the deploy IAM role that Deploy (deploy.yml)
# then assumes forever. It is the only step that needs pre-existing AWS credentials,
# because the deploy role cannot create itself before it exists (the OIDC
# chicken-and-egg). It applies ONLY the role from the main infra/ config (via
# -target); the next full Deploy run reconciles everything else.
#
# Prerequisite: the S3 state bucket must already exist — run `infra/bootstrap`
# locally once first (it can't store its own state in the bucket it creates).
#
# Setup (all in the GitHub UI — no local tooling):
#   1. Settings -> Secrets and variables -> Actions -> New repository secret:
#        AWS_BOOTSTRAP_ACCESS_KEY_ID       (an admin/bootstrap IAM user's key)
#        AWS_BOOTSTRAP_SECRET_ACCESS_KEY
#   2. Settings -> Secrets and variables -> Actions -> Variables -> New variable:
#        AWS_REGION   e.g. us-east-1
#      (No repo variable for the GitHub repo is needed — infra/cicd.tf defaults
#       github_repo to thayagapriyan/agent-lab. To override for a fork, set GH_REPO;
#       do NOT use GITHUB_REPO — GitHub reserves the GITHUB_ prefix and rejects it.)
#   3. Actions tab -> "Bootstrap OIDC" -> Run workflow.
#   4. Read the workflow summary: copy the printed role ARN into a new Actions
#      variable AWS_ROLE_ARN, then DELETE the two bootstrap secrets. Deploy then
#      uses OIDC — no long-lived keys, ever again.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (temporary keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_BOOTSTRAP_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_BOOTSTRAP_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.4

      # Apply ONLY the deploy role + its policies from the main config. -target is
      # appropriate here: a deliberate partial apply to lay the trust anchor; the next
      # full deploy.yml run reconciles everything else. The OIDC provider already
      # exists account-wide and is consumed via a data source, so it isn't targeted
      # (nothing to create).
      # github_repo defaults to thayagapriyan/agent-lab in infra/cicd.tf, so no var is
      # needed for the common case. To override (e.g. a fork), set the GH_REPO Actions
      # variable — NOT GITHUB_REPO: GitHub reserves the GITHUB_ prefix and rejects it.
      - name: Create deploy role
        working-directory: infra
        env:
          GH_REPO: ${{ vars.GH_REPO }}
        run: |
          terraform init
          REPO_ARG=""
          if [ -n "$GH_REPO" ]; then REPO_ARG="-var=github_repo=$GH_REPO"; fi
          terraform apply -auto-approve $REPO_ARG \
            -target=aws_iam_role.github_deploy \
            -target=aws_iam_role_policy_attachment.github_deploy_poweruser \
            -target=aws_iam_role_policy.github_deploy_iam \
            -target=aws_iam_role_policy.github_deploy_tfstate

      # The default GITHUB_TOKEN can't write Actions variables, so instead of
      # auto-setting it we print the role ARN with copy-paste instructions. The ARN
      # is stable, so this is a genuine one-time manual step.
      - name: Print deploy role ARN + next steps
        working-directory: infra
        run: |
          ROLE_ARN=$(terraform output -raw github_deploy_role_arn)
          echo "::notice title=Deploy role ARN::$ROLE_ARN"
          echo ""
          echo "=================================================================="
          echo " BOOTSTRAP SUCCEEDED — two manual steps remain:"
          echo "=================================================================="
          echo ""
          echo " 1. Set the Actions variable so Deploy can assume the role:"
          echo "      GitHub -> Settings -> Secrets and variables -> Actions"
          echo "        -> Variables tab -> New repository variable"
          echo "          Name:  AWS_ROLE_ARN"
          echo "          Value: $ROLE_ARN"
          echo ""
          echo " 2. Delete the now-unneeded bootstrap secrets:"
          echo "      same page -> Secrets tab -> delete:"
          echo "        AWS_BOOTSTRAP_ACCESS_KEY_ID"
          echo "        AWS_BOOTSTRAP_SECRET_ACCESS_KEY"
          echo ""
          echo " After step 1, push to main (or run Deploy manually) — it assumes"
          echo " this role via OIDC. No more keys needed, ever."
          echo "=================================================================="
