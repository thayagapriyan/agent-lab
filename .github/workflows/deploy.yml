name: CI / Deploy

# Two jobs:
#   test   — runs the mocked pytest suite (free, offline, no AWS) on every push & PR.
#   deploy — on push to main only: assumes the OIDC CI role and applies infra/
#            (Terraform). Needs the trust anchor from bootstrap.yml to exist first
#            and the AWS_ROLE_ARN / AWS_REGION Actions variables to be set.
#
# OIDC means no long-lived AWS keys live in GitHub: the deploy job exchanges a
# short-lived GitHub token for AWS credentials by assuming AWS_ROLE_ARN.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Required for the deploy job's OIDC token exchange.
permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Mocked smoke test only — RUN_LIVE is left unset, so no Bedrock call is made
      # and no AWS credentials are needed.
      - name: Run tests (offline, mocked)
        run: python -m pytest -q

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.4

      # The main infra/ config uses the S3 backend (infra/backend.tf). Account-wide
      # singletons (the OIDC provider + shared state bucket) live in the aws-foundation
      # repo and are referenced here, not created — so nothing extra is applied.
      - name: Terraform apply (infra/)
        working-directory: infra
        run: |
          terraform init
          terraform apply -auto-approve
          terraform output
